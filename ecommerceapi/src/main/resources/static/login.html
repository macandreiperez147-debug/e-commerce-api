<<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form method="POST" action="/login">

    <input type="hidden"
           id="csrfToken"
           name="_csrf">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">Login</button>

</form>

<script>

fetch('/csrf')
    .then(response => response.json())
    .then(data => {
        document.getElementById("csrfToken").value = data.token;
    });

</script>

</body>
</html>
