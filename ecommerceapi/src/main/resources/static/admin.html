<!DOCTYPE html>
<html>
<head>
    <title>Admin Page</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<button onclick="deleteProduct()">Delete Product ID 10</button>

<!-- FETCH WRAPPER -->
<script src="fetch-wrapper.js"></script>

<script>

    // PROTECTED ROUTE CHECK
    async function checkAdmin() {

        const response = await apiFetch(
            "http://localhost:8080/api/v1/products"
        );

        if (!response) {
            return;
        }

        console.log("Admin page access OK (or at least authenticated)");
    }

    checkAdmin();

    async function deleteProduct() {

        // GET CSRF TOKEN
        const csrfResponse = await fetch(
            "http://localhost:8080/csrf",
            {
                credentials: "include"
            }
        );

        const csrfData = await csrfResponse.json();

        // DELETE REQUEST (WITH ERROR HANDLING)
        const response = await apiFetch(
            "http://localhost:8080/api/v1/products/10",
            {
                method: "DELETE",
                credentials: "include",
                headers: {
                    "X-CSRF-TOKEN": csrfData.token
                }
            }
        );

        if (!response) {
            return;
        }

        alert("Product deleted successfully");
    }

</script>

</body>
</html>
